<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Dia das Mães</title>
    <meta property="og:title" content="Uma surpresa para você, mamãe! ❤️">
    <meta property="og:description" content="Abra para ver a mensagem e o vídeo que preparei com carinho.">
    
    <style>
        /* Estilos base para a página */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe6e6 0%, #ffb3c6 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* O "cartão" branco no centro */
        .card {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 40px 25px;
            border-radius: 24px;
            box-shadow: 0 15px 30px rgba(214, 51, 108, 0.2);
            text-align: center;
            max-width: 350px;
            width: 100%;
        }

        /* Título */
        h1 {
            color: #d6336c;
            font-size: 28px;
            margin-top: 0;
            margin-bottom: 20px;
        }

        /* Área da mensagem */
        .message {
            color: #555;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* Estilo do Vídeo */
        #bg-video {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            background-color: #000; /* Fundo preto caso o vídeo demore a carregar */
        }

        /* Botão de vídeo */
        #play-btn {
            background-color: #d6336c;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(214, 51, 108, 0.4);
            transition: transform 0.2s, background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            gap: 10px;
        }

        #play-btn:active {
            transform: scale(0.95);
        }

        /* Corações decorativos */
        .decoration {
            font-size: 30px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="decoration">💖✨</div>
        
        <h1>Feliz Dia das Mães!</h1>
        
        <p class="message">
            [Agradeço a Deus pelo privilégio de poder te chamar de minha mãe]
        </p>

        <video id="bg-video" src="0418.mp4" playsinline></video>

        <button id="play-btn">
            <span>▶️</span> Reproduzir Vídeo
        </button>
    </div>

<script>
    const video = document.getElementById('bg-video');
    const btn = document.getElementById('play-btn');
    let isPlaying = false;

    btn.addEventListener('click', () => {
        // Verificamos se o vídeo existe e está pronto
        if (video.paused) {
            video.play().then(() => {
                btn.innerHTML = '<span>⏸️</span> Pausar Vídeo';
                isPlaying = true;
            }).catch(error => {
                console.log("Erro ao dar play:", error);
                alert("O vídeo ainda está carregando ou não foi encontrado.");
            });
        } else {
            video.pause();
            btn.innerHTML = '<span>▶️</span> Reproduzir Vídeo';
            isPlaying = false;
        }
    });

    video.onended = function() {
        isPlaying = false;
        btn.innerHTML = '<span>▶️</span> Reproduzir Vídeo';
    };
</script>
</body>
</html>
